# Configuración de Fly.io para la rifa "Viaja por Colombia".
# Deploy: fly deploy   (los secrets de runtime ya están con `fly secrets set`)

app = 'rifa'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

  # Se incrustan en el bundle del NAVEGADOR durante el build.
  # Son valores públicos por diseño (la publishable key solo lee vistas públicas).
  [build.args]
    NEXT_PUBLIC_SUPABASE_URL = 'https://falakbqcbvtadmxkkhiu.supabase.co'
    NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_HmiRVOsJkh6xrix_05VBpQ_Q6a3eECQ'
    NEXT_PUBLIC_SITE_URL = 'https://rifa.fly.dev'

[env]
  PORT = '8080'
  HOSTNAME = '0.0.0.0'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  # 512MB: con 256MB Next.js SSR sufría de inestabilidad intermitente
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
